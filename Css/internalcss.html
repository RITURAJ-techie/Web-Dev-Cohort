<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 {
            color: aqua ;
            background-color: black;
            font-weight: bolder;
            text-decoration: underline;
        }
        
        button {
            background-color: brown;
            color: white;

            border: none;
            border-radius: 20px;
        }


        </style>    

        <!-- Already defined the button properties in <style> section, but when I added external

        <link rel="stylesheet" href="external.css">
</head>
<body>
    <h1>ChaiCode</h1>
    <button>Click Me</button>
    <button style="background-color: yellow; color: black; font-style: normal;">Click Me</button>

    <!-- multipleClass -->

    <button id="penguin" class="my-loving-buttons">Email Me</button>
