<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlify Clone</title>
    <link rel="stylesheet" href="netlify.css">
</head>
<body>

    <!-- Navbar -->

        <div class="logo">netlify</div>

        <nav class="nav-links">
            <a href="#">Platform</a>
            <a href="#">Solutions</a>
            <a href="#">Developers</a>
